<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一緒に働きたい人投票アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app" aria-labelledby="appTitle">
    <header class="page-header">
      <div class="eyebrow">Internal Appreciation Map</div>
      <h1 id="appTitle">一緒に働きたい人投票アプリ</h1>
      <p>感謝、相談しやすさ、助け合いの記録を名前ごとに集計する社内ポータル向け試作です。</p>
    </header>

    <section class="top-grid">
      <form id="postForm" class="post-form">
        <h2>コメントを投稿</h2>

        <label>
          <span>名前</span>
          <select id="employeeSelect" required></select>
        </label>

        <label>
          <span>コメント種別</span>
          <select id="typeSelect" required>
            <option value="おかげで仕事がうまくいきました">おかげで仕事がうまくいきました</option>
            <option value="教えてもらってわかりやすかったです">教えてもらってわかりやすかったです</option>
            <option value="困っている時に助けてもらいました">困っている時に助けてもらいました</option>
            <option value="一緒に働きたいと思いました">一緒に働きたいと思いました</option>
            <option value="その他">その他</option>
          </select>
        </label>

        <label class="full">
          <span>コメント本文</span>
          <textarea id="commentInput" maxlength="220" placeholder="具体的に助かったこと、相談しやすかったことを書いてください。" required></textarea>
        </label>

        <button type="submit">投稿する</button>
      </form>

      <section class="ranking-panel" aria-labelledby="rankingTitle">
        <div class="section-heading">
          <h2 id="rankingTitle">ランキング</h2>
          <span id="postCount" class="pill">0件</span>
        </div>
        <div id="rankingList" class="ranking-list" aria-live="polite"></div>
      </section>
    </section>

    <section class="employee-section" aria-labelledby="employeeTitle">
      <div class="section-heading">
        <h2 id="employeeTitle">社員カード</h2>
      </div>
      <div id="employeeCards" class="employee-grid"></div>
    </section>

    <section class="comments-section" aria-labelledby="commentsTitle">
      <div class="section-heading">
        <h2 id="commentsTitle">コメント一覧</h2>
        <button id="resetButton" class="ghost-button" type="button">サンプルに戻す</button>
      </div>
      <div id="commentList" class="comment-list" aria-live="polite"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
